name: Relexm 24/7 Bot
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python_version: '3.9'
      - run: pip install -r requirements.txt
      - run: python main.py
      
